name: container

on:
  push:
    branches: [master]
    tags:
      - 'v*'
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-24.04
          - arch: arm64
            runner: ubuntu-24.04-arm
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v6

      - name: Build image
        id: build
        uses: redhat-actions/buildah-build@v2.13
        with:
          image: gmail-mcp-server
          tags: ${{ github.sha }}-${{ matrix.arch }}
          containerfiles: ./Containerfile
          platforms: linux/${{ matrix.arch }}

      - name: Push per-arch image
        if: github.event_name != 'pull_request'
        uses: redhat-actions/push-to-registry@v2.8
        with:
          image: ${{ steps.build.outputs.image }}
          tags: ${{ steps.build.outputs.tags }}
          registry: ghcr.io/${{ github.repository_owner }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

  manifest:
    needs: build
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-24.04
    permissions:
      packages: write

    steps:
      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository_owner }}/gmail-mcp-server
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Create and push multi-arch manifest
        run: |
          IMAGE="ghcr.io/${{ github.repository_owner }}/gmail-mcp-server"
          while IFS= read -r tag; do
            docker buildx imagetools create \
              -t "$tag" \
              "${IMAGE}:${{ github.sha }}-amd64" \
              "${IMAGE}:${{ github.sha }}-arm64"
          done <<< "${{ steps.meta.outputs.tags }}"
